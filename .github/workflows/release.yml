name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build · ${{ matrix.os }} · ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon only — Intel Macs are not supported.
          - os: macos-latest
            arch: arm64
            label: macos-arm64
          # Windows — x64 squirrel installer.
          - os: windows-latest
            arch: x64
            label: windows
          # Linux — deb + AppImage + zip.
          - os: ubuntu-latest
            arch: x64
            label: linux

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot dpkg libfuse2

      - name: Install dependencies
        # `npm install` (not `ci`) so node-24-generated lockfiles still work
        # on the CI's node-20 npm — small repo, determinism is acceptable.
        run: npm install --no-audit --no-fund

      - name: Build (renderer + agent-runtime)
        run: npm run build

      - name: Make (Electron Forge)
        run: npx electron-forge make --arch=${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}-${{ matrix.arch }}
          path: |
            out/make/**/*.dmg
            out/make/**/*.zip
            out/make/**/*.exe
            out/make/**/*.nupkg
            out/make/**/*.deb
            out/make/**/*.AppImage
            out/make/**/RELEASES
          if-no-files-found: error
          retention-days: 14

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact tree
        run: |
          mkdir -p dist
          find artifacts -type f \( \
            -name '*.dmg' -o \
            -name '*.zip' -o \
            -name '*.exe' -o \
            -name '*.nupkg' -o \
            -name '*.deb' -o \
            -name '*.AppImage' -o \
            -name 'RELEASES' \
          \) -exec cp -v {} dist/ \;
          ls -la dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
